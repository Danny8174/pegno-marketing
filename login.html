<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=https://app.pegno.co" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Pegno</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #edf0f4; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; text-align: center; padding: 2rem;
    }
    .card {
      background: #f8f9fb; border: 1px solid #d8dde6;
      border-radius: 1rem; padding: 3rem 2rem; max-width: 400px;
    }
    img { margin: 0 auto 1.5rem; height: 48px; width: 48px; object-fit: contain; }
    h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.03em; margin-bottom: 0.75rem; color: #111827; }
    p { color: #6b7280; margin-bottom: 1.5rem; }
    a.btn {
      display: inline-block; background: #1a56db; color: #fff;
      padding: 0.75rem 2rem; border-radius: 9999px;
      font-weight: 600; font-size: 1rem; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="pegno-log.png.png" alt="Pegno" />
    <h1>Redirecting to Pegno...</h1>
    <p>Taking you to the Pegno app. If you are not redirected automatically, click below.</p>
    <a href="https://app.pegno.co" class="btn">Open Pegno App</a>
  </div>
</body>
</html>
